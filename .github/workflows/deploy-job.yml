name: Reusable Deploy
on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: ./dist

      - name: Deploy Stub
        run: |
          echo "Деплоим на контур: ${{ inputs.env_name }}"
          echo "Файлы для деплоя:"
          ls -R ./dist
          echo "Успешно 'задеплоено'!"